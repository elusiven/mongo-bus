# .github/workflows/python-client.yml
name: python-client

on:
  push:
    branches: [main]
    paths: ["clients/python/**"]
    tags: ["py-v*"]
  pull_request:
    paths: ["clients/python/**"]
  workflow_dispatch: {} # manual trigger for the TestPyPI dry-run

defaults:
  run:
    working-directory: clients/python

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[test]"
      - run: python -m pytest --cov=mongobus --cov-report=term-missing --cov-fail-under=95

  # Manual dry-run: publish to TestPyPI to validate the release end-to-end.
  # Requires a TestPyPI "pending publisher" configured for this repo + workflow.
  testpypi:
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist
          repository-url: https://test.pypi.org/legacy/

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/py-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist
