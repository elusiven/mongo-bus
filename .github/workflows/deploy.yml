name: Deploy to NuGet

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install GitVersion
              uses: gittools/actions/gitversion/setup@v3.1.11
              with:
                  versionSpec: '5.x'

            - name: Validate GitVersion config
              run: |
                set -euo pipefail
                dotnet-gitversion "$GITHUB_WORKSPACE" /config GitVersion.yml /output json > gitversion-validate.json
                python - <<'PY'
                import json
                import sys

                with open("gitversion-validate.json", "r", encoding="utf-8") as f:
                    data = json.load(f)

                required = ["SemVer", "NuGetVersionV2", "FullSemVer"]
                missing = [k for k in required if not data.get(k)]

                if missing:
                    print(f"::error::GitVersion JSON missing required keys: {', '.join(missing)}")
                    sys.exit(1)

                print(f"GitVersion config validated. SemVer={data['SemVer']} NuGetVersionV2={data['NuGetVersionV2']}")
                PY

            - name: Determine Version
              id: gitversion
              uses: gittools/actions/gitversion/execute@v3.1.11
              with:
                useConfigFile: true
                configFilePath: GitVersion.yml

            - name: Display GitVersion outputs
              run: |
                echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"
                echo "NuGetVersionV2: ${{ steps.gitversion.outputs.nuGetVersionV2 }}"
                echo "FullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}"

            - name: Validate Version
              run: |
                if [ -z "${{ steps.gitversion.outputs.nuGetVersionV2 }}" ]; then
                  echo "Error: GitVersion did not produce a version"
                  exit 1
                fi

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: |
                      10.x

            - name: Restore dependencies
              run: dotnet restore

            - name: Build
              run: dotnet build --no-restore -c Release /p:Version=${{ steps.gitversion.outputs.nuGetVersionV2 }}

            - name: Pack
              run: dotnet pack --no-build -c Release -o out /p:Version=${{ steps.gitversion.outputs.nuGetVersionV2 }}

            - name: Push to NuGet
              run: dotnet nuget push "out/*.nupkg" -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate

            - name: Push to GitHub Packages
              run: dotnet nuget push "out/*.nupkg" -k ${{ secrets.GH_TOKEN }} -s https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
